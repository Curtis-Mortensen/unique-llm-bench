        },
        "Mana Vault": {
          "mana_cost": "{1}",
          "type_line": "Artifact",
          "oracle_text": "Mana Vault doesn't untap during your untap step.\nAt the beginning of your upkeep, you may pay {4}. If you do, untap Mana Vault.\nAt the beginning of your draw step, if Mana Vault is tapped, it deals 1 damage to you.\n{T}: Add {C}{C}{C}.",
          "rarity": "Mythic Rare"
        }
      }
