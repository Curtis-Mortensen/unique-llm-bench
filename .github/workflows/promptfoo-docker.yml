name: Run Promptfoo Docker Evals

on:
  workflow_dispatch: # Run manually from the Actions tab
  push:
    paths:
      - "promptfooconfig.yaml" # Also run when config changes

jobs:
  promptfoo-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run promptfoo evals
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e OPENROUTER_API_KEY=$OPENROUTER_API_KEY \
            ghcr.io/promptfoo/promptfoo:latest \
            eval --config promptfooconfig.yaml --no-cache

      - name: Upload results as artifact
        if: always() # Upload even if eval fails
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: output/
          retention-days: 30
