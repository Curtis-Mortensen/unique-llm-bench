name: Test OpenRouter API

on:
  workflow_dispatch:

jobs:
  test-openrouter:
    runs-on: ubuntu-latest

    steps:
      - name: Call OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          response=$(curl -s https://openrouter.ai/api/v1 \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "google/gemini-3.1-flash-lite-preview",
              "messages": [
                {
                  "role": "user",
                  "content": "Reply with: OpenRouter API is working"
                }
              ]
            }')

          echo "API response:"
          echo "$response"

          if echo "$response" | grep -q "OpenRouter API is working"; then
            echo "Success: OpenRouter API key is working"
          else
            echo "Failure: Unexpected response"
            exit 1
          fi
