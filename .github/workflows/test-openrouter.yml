name: Test OpenRouter API Key

on:
  workflow_dispatch: # Run manually from the Actions tab

jobs:
  test-openrouter:
    runs-on: ubuntu-latest

    steps:
      - name: Send test request to OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Sending test request to OpenRouter..."

          RESPONSE=$(curl -s -w "\n%{http_code}" https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "google/gemini-3.1-flash-lite-preview",
              "messages": [
                {
                  "role": "user",
                  "content": "Say hello in one word."
                }
              ],
              "max_tokens": 10
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ OpenRouter API key is working!"
          else
            echo "❌ Request failed with status $HTTP_CODE"
            exit 1
          fi
